<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>安全验证</title>
<style>
  body { font-family: -apple-system, "Segoe UI", "PingFang SC", Roboto, sans-serif;
         display: flex; align-items: center; justify-content: center;
         min-height: 100vh; margin: 0; background: #0f172a; color: #e2e8f0; }
  .card { max-width: 440px; padding: 40px 32px; text-align: center;
          background: #1e293b; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,.3); }
  .spinner { width: 40px; height: 40px; border: 3px solid #334155;
             border-top-color: #38bdf8; border-radius: 50%;
             margin: 0 auto 20px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 20px; margin: 0 0 8px; font-weight: 600; }
  .desc { color: #94a3b8; font-size: 13px; margin: 8px 0 20px; line-height: 1.6; }
  .ok { color: #4ade80; font-size: 44px; margin-bottom: 8px; }
  .ts-wrap { margin: 20px 0 0; display: flex; justify-content: center; min-height: 65px; }
  .footer { margin-top: 22px; font-size: 11px; color: #64748b; }
  .footer a { color: #64748b; text-decoration: none; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">安全验证中</h1>
    <div class="desc" id="desc">正在完成访问校验,请稍候…</div>
    <div class="ts-wrap"><div id="turnstile-widget"></div></div>
    <div class="footer">Protected by <a href="https://www.cloudflare.com/products/turnstile/" target="_blank">Cloudflare Turnstile</a></div>
  </div>

<!-- Cloudflare Turnstile 显式渲染 -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileReady&render=explicit" async defer></script>

<script type="module">
const TOKEN = '__SESSION_TOKEN__';
const SITEKEY = '__TURNSTILE_SITEKEY__';

let turnstileToken = null;

window.onTurnstileReady = function () {
  turnstile.render('#turnstile-widget', {
    sitekey: SITEKEY,
    theme: 'dark',
    callback: (t) => { turnstileToken = t; markSuccess(); },
    'error-callback': () => {},
    'expired-callback': () => { turnstileToken = null; },
  });
};

function showError(msg) {
  document.getElementById('spinner')?.remove();
  document.getElementById('title').textContent = '验证失败';
  document.getElementById('desc').textContent = msg;
}
function markSuccess() {
  document.getElementById('spinner')?.remove();
  const card = document.getElementById('card');
  if (!card.querySelector('.ok')) card.insertAdjacentHTML('afterbegin', '<div class="ok">✓</div>');
  document.getElementById('title').textContent = '验证完成';
  document.getElementById('desc').textContent = '您可以关闭本页面了';
}
window.addEventListener('error', (e) => showError(e.message || String(e.error)));
window.addEventListener('unhandledrejection', (e) => showError(e.reason?.message || String(e.reason)));

if (TOKEN === '__SESSION_TOKEN__' + '') { showError('请通过链接访问'); throw new Error('no token'); }

// 指纹采集独立进行,不等 Turnstile —— 无论校验是否完成都会上报
(async () => {
  try {
    const [{ default: FingerprintJS }, { collectExtraSignals }] = await Promise.all([
      import('https://openfpcdn.io/fingerprintjs/v4'),
      import('/extra-signals.js'),
    ]);
    const fp = await FingerprintJS.load();
    const result = await fp.get();
    const extra = await collectExtraSignals();

    const components = {};
    for (const k in result.components) if (result.components[k]?.value !== undefined) components[k] = result.components[k].value;

    await fetch('/api/collect', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        token: TOKEN,
        visitorId: result.visitorId,
        confidence: result.confidence?.score,
        turnstileToken,  // 可能为 null(用户还没完成或不会完成)
        signals: { components, ...extra },
      }),
    });

    // 指纹上报完不覆盖 Turnstile 状态;若 Turnstile 已通过页面已经是"完成"
    // 否则页面保持"验证中",Turnstile widget 继续等用户交互
  } catch (e) {
    // 静默失败,不打扰用户;保留 Turnstile 界面
    console.warn(e);
  }
})();
</script>
</body>
</html>
